services:
  - type: worker
    name: suslab-discord-bot
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: bot
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
